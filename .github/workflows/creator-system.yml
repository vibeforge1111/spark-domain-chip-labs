name: Creator System

on:
  workflow_dispatch:
    inputs:
      run_generated_multi_seed:
        description: "Run generated 36-row multi-seed matrix after normal checks"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  pull_request:
    paths:
      - "docs/creator_system/**"
      - "src/chip_labs/**"
      - "tests/test_creator_*.py"
      - "tests/test_artifact_quality.py"
      - "tests/test_mirofish_content_simulation.py"
      - "tests/test_operator_review.py"
      - "tests/test_retrieval_memory.py"
      - "tests/test_startup_yc_operator_validation.py"
      - "tests/test_tool_operation.py"
      - ".github/workflows/creator-system.yml"
  push:
    branches: ["main"]
    paths:
      - "docs/creator_system/**"
      - "src/chip_labs/**"
      - "tests/test_creator_*.py"
      - "tests/test_artifact_quality.py"
      - "tests/test_mirofish_content_simulation.py"
      - "tests/test_operator_review.py"
      - "tests/test_retrieval_memory.py"
      - "tests/test_startup_yc_operator_validation.py"
      - "tests/test_tool_operation.py"
      - ".github/workflows/creator-system.yml"

jobs:
  creator-system:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest ruff jsonschema

      - name: Lint creator-system surfaces
        run: |
          python -m ruff check \
            src/chip_labs/creator_mission_adapter.py \
            src/chip_labs/operator_review.py \
            src/chip_labs/startup_yc_promotion.py \
            src/chip_labs/cli.py \
            tests/test_creator_mission_adapter.py \
            tests/test_creator_system_docs.py \
            tests/test_operator_review.py \
            tests/test_startup_yc_operator_validation.py

      - name: Run creator-system tests
        run: |
          python -m pytest \
            tests/test_creator_mission_adapter.py \
            tests/test_creator_system_docs.py \
            tests/test_startup_yc_operator_validation.py \
            tests/test_tool_operation.py \
            tests/test_artifact_quality.py \
            tests/test_mirofish_content_simulation.py \
            tests/test_operator_review.py \
            tests/test_creator_generator_acceptance.py \
            tests/test_creator_run.py \
            tests/test_creator_run_examples.py \
            tests/test_retrieval_memory.py \
            -q

      - name: Run strict Startup YC fixture checks
        run: |
          python -m chip_labs.cli creator-run-smoke docs/creator_system/examples/startup-yc-creator-run --output /tmp/startup-yc-smoke.json --fail-on-blocked --fail-on-warn
          python -m chip_labs.cli startup-yc-validation-evidence-check --evidence docs/creator_system/examples/startup-yc-operator-validation/shape_only_multi_seed_evidence.json --evidence-kind multi_seed --output /tmp/startup-yc-validation-evidence-check.json --fail-on-blocked
          python - <<'PY'
          import json
          from pathlib import Path

          import jsonschema

          smoke_schema = json.loads(
              Path("docs/creator_system/schemas/smoke-result.schema.json").read_text()
          )
          smoke_payload = json.loads(Path("/tmp/startup-yc-smoke.json").read_text())
          jsonschema.Draft202012Validator(smoke_schema).validate(smoke_payload)
          assert smoke_payload["evidence_mode"] == "saved"
          plan_schema = json.loads(
              Path("docs/creator_system/schemas/startup-yc-validation-plan.schema.json").read_text()
          )
          plan_payload = json.loads(
              Path("docs/creator_system/examples/startup-yc-operator-validation/validation_plan.json").read_text()
          )
          jsonschema.Draft202012Validator(plan_schema).validate(plan_payload)
          raw_schema = json.loads(Path("docs/creator_system/schemas/startup-yc-validation-evidence.schema.json").read_text())
          raw_payload = json.loads(Path("docs/creator_system/examples/startup-yc-operator-validation/shape_only_multi_seed_evidence.json").read_text())
          jsonschema.Draft202012Validator(raw_schema).validate(raw_payload)
          schema = json.loads(Path("docs/creator_system/schemas/startup-yc-validation-evidence-check-result.schema.json").read_text())
          payload = json.loads(Path("/tmp/startup-yc-validation-evidence-check.json").read_text())
          jsonschema.Draft202012Validator(schema).validate(payload)
          PY
          python -m chip_labs.cli startup-yc-validation-suite --validation-plan docs/creator_system/examples/startup-yc-operator-validation/validation_plan.json --output /tmp/startup-yc-validation-suite.json
          python - <<'PY'
          import json
          from pathlib import Path

          import jsonschema
          import referencing

          schema = json.loads(Path("docs/creator_system/schemas/startup-yc-validation-suite.schema.json").read_text())
          gate_schema = json.loads(Path("docs/creator_system/schemas/startup-yc-gate-check-result.schema.json").read_text())
          registry = referencing.Registry().with_resource(
              gate_schema["$id"],
              referencing.Resource.from_contents(gate_schema),
          )
          validator = jsonschema.Draft202012Validator(schema, registry=registry)
          for payload_path in (
              Path("/tmp/startup-yc-validation-suite.json"),
              Path("docs/creator_system/examples/startup-yc-operator-validation/validation_suite_blocked.json"),
          ):
              payload = json.loads(payload_path.read_text())
              validator.validate(payload)
          PY
          python -m chip_labs.cli creator-run-template-check --fail-on-blocked

      - name: Run manual generated multi-seed matrix
        if: github.event_name == 'workflow_dispatch' && inputs.run_generated_multi_seed == 'true'
        run: |
          python -m chip_labs.cli generated-multi-seed-run \
            --briefs docs/creator_system/examples/generated-multi-domain-briefs.json \
            --workspace-dir /tmp/generated-creator-matrix \
            --output /tmp/generated-multi-seed-summary.json \
            --fail-on-blocked
          python -m chip_labs.cli generated-multi-seed-summary-check \
            --summary /tmp/generated-creator-matrix/multi_seed_validation_summary.json \
            --output /tmp/generated-multi-seed-summary-check.json \
            --fail-on-blocked
          python - <<'PY'
          import json
          from pathlib import Path

          import jsonschema

          for schema_path, payload_path in (
              (
                  "docs/creator_system/schemas/generated-multi-seed-summary.schema.json",
                  "/tmp/generated-multi-seed-summary.json",
              ),
              (
                  "docs/creator_system/schemas/generated-multi-seed-summary-check.schema.json",
                  "/tmp/generated-multi-seed-summary-check.json",
              ),
          ):
              schema = json.loads(Path(schema_path).read_text())
              payload = json.loads(Path(payload_path).read_text())
              jsonschema.Draft202012Validator(schema).validate(payload)
          PY
