name: Creator System

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
    inputs:
      run_generated_multi_seed:
        description: "Run generated 36-row multi-seed matrix after normal checks"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  pull_request:
    paths:
      - "docs/creator_system/**"
      - "src/chip_labs/**"
      - "tests/test_creator_*.py"
      - "tests/test_artifact_quality.py"
      - "tests/test_mirofish_content_simulation.py"
      - "tests/test_operator_review.py"
      - "tests/test_product_runtime_review.py"
      - "tests/test_creator_beta_readiness.py"
      - "tests/test_retrieval_memory.py"
      - "tests/test_startup_yc_operator_validation.py"
      - "tests/test_tool_operation.py"
      - ".github/workflows/creator-system.yml"
  push:
    branches: ["main"]
    paths:
      - "docs/creator_system/**"
      - "src/chip_labs/**"
      - "tests/test_creator_*.py"
      - "tests/test_artifact_quality.py"
      - "tests/test_mirofish_content_simulation.py"
      - "tests/test_operator_review.py"
      - "tests/test_product_runtime_review.py"
      - "tests/test_creator_beta_readiness.py"
      - "tests/test_retrieval_memory.py"
      - "tests/test_startup_yc_operator_validation.py"
      - "tests/test_tool_operation.py"
      - ".github/workflows/creator-system.yml"

permissions:
  contents: read

jobs:
  creator-system:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest ruff jsonschema

      - name: Lint chip-labs package and tests
        run: |
          python -m ruff check src/chip_labs tests

      - name: Run creator-system tests
        run: |
          python -m pytest \
            tests/test_creator_mission_adapter.py \
            tests/test_creator_system_docs.py \
            tests/test_startup_yc_operator_validation.py \
            tests/test_tool_operation.py \
            tests/test_artifact_quality.py \
            tests/test_mirofish_content_simulation.py \
            tests/test_operator_review.py \
            tests/test_product_runtime_review.py \
            tests/test_creator_beta_readiness.py \
            tests/test_creator_generator_acceptance.py \
            tests/test_creator_run.py \
            tests/test_creator_run_examples.py \
            tests/test_retrieval_memory.py \
            -q

      - name: Run strict Startup YC fixture checks
        run: |
          python -m chip_labs.cli creator-run-smoke docs/creator_system/examples/startup-yc-creator-run --output /tmp/startup-yc-smoke.json --fail-on-blocked --fail-on-warn
          python -m chip_labs.cli startup-yc-validation-evidence-check --evidence docs/creator_system/examples/startup-yc-operator-validation/shape_only_multi_seed_evidence.json --evidence-kind multi_seed --output /tmp/startup-yc-validation-evidence-check.json --fail-on-blocked
          python - <<'PY'
          import json
          from pathlib import Path

          import jsonschema

          smoke_schema = json.loads(
              Path("docs/creator_system/schemas/smoke-result.schema.json").read_text()
          )
          smoke_payload = json.loads(Path("/tmp/startup-yc-smoke.json").read_text())
          jsonschema.Draft202012Validator(smoke_schema).validate(smoke_payload)
          assert smoke_payload["evidence_mode"] == "saved"
          plan_schema = json.loads(
              Path("docs/creator_system/schemas/startup-yc-validation-plan.schema.json").read_text()
          )
          plan_payload = json.loads(
              Path("docs/creator_system/examples/startup-yc-operator-validation/validation_plan.json").read_text()
          )
          jsonschema.Draft202012Validator(plan_schema).validate(plan_payload)
          raw_schema = json.loads(Path("docs/creator_system/schemas/startup-yc-validation-evidence.schema.json").read_text())
          raw_payload = json.loads(Path("docs/creator_system/examples/startup-yc-operator-validation/shape_only_multi_seed_evidence.json").read_text())
          jsonschema.Draft202012Validator(raw_schema).validate(raw_payload)
          schema = json.loads(Path("docs/creator_system/schemas/startup-yc-validation-evidence-check-result.schema.json").read_text())
          payload = json.loads(Path("/tmp/startup-yc-validation-evidence-check.json").read_text())
          jsonschema.Draft202012Validator(schema).validate(payload)
          PY
          python -m chip_labs.cli startup-yc-validation-suite --validation-plan docs/creator_system/examples/startup-yc-operator-validation/validation_plan.json --output /tmp/startup-yc-validation-suite.json
          python -m chip_labs.cli startup-yc-network-absorption-review --validation-plan docs/creator_system/examples/startup-yc-operator-validation/validation_plan.json --validation-suite docs/creator_system/examples/startup-yc-operator-validation/validation_suite_blocked.json --output /tmp/startup-yc-network-absorption-review.json
          python -m chip_labs.cli startup-yc-production-gate-workbench --validation-plan docs/creator_system/examples/startup-yc-operator-validation/validation_plan.json --workspace-dir /tmp/startup-yc-production-gate-workbench --output /tmp/startup-yc-production-gate-workbench.json
          python -m chip_labs.cli creator-release-gate --validation-plan docs/creator_system/examples/startup-yc-operator-validation/validation_plan.json --startup-network-review /tmp/startup-yc-network-absorption-review.json --output /tmp/creator-release-gate.json
          python - <<'PY'
          import json
          from pathlib import Path

          import jsonschema
          import referencing

          schema = json.loads(Path("docs/creator_system/schemas/startup-yc-validation-suite.schema.json").read_text())
          gate_schema = json.loads(Path("docs/creator_system/schemas/startup-yc-gate-check-result.schema.json").read_text())
          registry = referencing.Registry().with_resource(
              gate_schema["$id"],
              referencing.Resource.from_contents(gate_schema),
          )
          validator = jsonschema.Draft202012Validator(schema, registry=registry)
          for payload_path in (
              Path("/tmp/startup-yc-validation-suite.json"),
              Path("docs/creator_system/examples/startup-yc-operator-validation/validation_suite_blocked.json"),
          ):
              payload = json.loads(payload_path.read_text())
              validator.validate(payload)
          review_schema = json.loads(Path("docs/creator_system/schemas/startup-yc-network-absorption-review.schema.json").read_text())
          review_validator = jsonschema.Draft202012Validator(review_schema)
          for payload_path in (
              Path("/tmp/startup-yc-network-absorption-review.json"),
              Path("docs/creator_system/examples/startup-yc-operator-validation/network_absorption_review_blocked.json"),
          ):
              payload = json.loads(payload_path.read_text())
              review_validator.validate(payload)
              assert payload["verdict"] == "blocked"
              assert payload["network_absorbable"] is False
              assert "external_provenance:missing" in payload["blocking_checks"]
          workbench_schema = json.loads(Path("docs/creator_system/schemas/startup-yc-production-gate-workbench.schema.json").read_text())
          workbench_payload = json.loads(Path("/tmp/startup-yc-production-gate-workbench.json").read_text())
          jsonschema.Draft202012Validator(workbench_schema).validate(workbench_payload)
          assert workbench_payload["verdict"] == "blocked"
          assert workbench_payload["network_absorbable"] is False
          assert workbench_payload["workspace_was_clean"] is True
          assert workbench_payload["gate_verdicts"]["held_out_founder_advice_pass"] == "passed"
          assert workbench_payload["gate_verdicts"]["multi_seed_validation"] == "blocked"
          assert "external_provenance:missing" in workbench_payload["blocking_checks"]
          release_schema = json.loads(Path("docs/creator_system/schemas/creator-release-gate.schema.json").read_text())
          release_payload = json.loads(Path("/tmp/creator-release-gate.json").read_text())
          jsonschema.Draft202012Validator(release_schema).validate(release_payload)
          assert release_payload["verdict"] == "blocked"
          assert release_payload["network_absorbable"] is False
          assert "generated_multi_seed_validation:missing_generated_multi_seed_summary" in release_payload["blocking_checks"]
          assert "product_runtime_integration_review:missing_product_runtime_review" in release_payload["blocking_checks"]
          assert any(
              blocker.startswith("startup_yc_network_absorption_review:")
              for blocker in release_payload["blocking_checks"]
          )
          PY
          python -m chip_labs.cli creator-system-beta-check --output /tmp/creator-system-beta-check.json --fail-on-blocked
          python - <<'PY'
          import json
          from pathlib import Path

          import jsonschema

          schema = json.loads(Path("docs/creator_system/schemas/creator-system-beta-check.schema.json").read_text())
          payload = json.loads(Path("/tmp/creator-system-beta-check.json").read_text())
          jsonschema.Draft202012Validator(schema).validate(payload)
          assert payload["verdict"] == "pass"
          assert payload["network_absorbable"] is False
          assert not payload["blocking_checks"]
          PY
          python -m chip_labs.cli creator-system-production-readiness --workspace-dir /tmp/creator-system-production-readiness --output /tmp/creator-system-production-readiness.json --fail-on-blocked
          python - <<'PY'
          import json
          from pathlib import Path

          import jsonschema

          schema = json.loads(Path("docs/creator_system/schemas/creator-system-production-readiness.schema.json").read_text())
          payload = json.loads(Path("/tmp/creator-system-production-readiness.json").read_text())
          jsonschema.Draft202012Validator(schema).validate(payload)
          assert payload["verdict"] == "pass"
          assert payload["network_absorbable"] is False
          tracks = {track["name"]: track for track in payload["readiness_tracks"]}
          assert tracks["repo_user_beta_readiness"]["score"] == 100
          assert tracks["production_grade_creator_system_standard"]["score"] == 100
          assert tracks["network_absorption_publication"]["verdict"] == "blocked"
          assert payload["release_gate_summary"]["generated_phase_passed"] is True
          assert payload["release_gate_summary"]["product_phase_passed"] is True
          assert payload["release_gate_summary"]["startup_phase_passed"] is False
          PY
          python -m chip_labs.cli creator-system-release-evidence --production-readiness /tmp/creator-system-production-readiness.json --output /tmp/creator-system-release-evidence.json --fail-on-blocked
          python - <<'PY'
          import json
          from pathlib import Path

          import jsonschema

          schema = json.loads(Path("docs/creator_system/schemas/creator-system-release-evidence.schema.json").read_text())
          payload = json.loads(Path("/tmp/creator-system-release-evidence.json").read_text())
          jsonschema.Draft202012Validator(schema).validate(payload)
          assert payload["verdict"] == "pass"
          assert payload["release_ready"] is True
          assert payload["network_absorbable"] is False
          assert payload["repo"]["worktree_clean"] is True
          assert payload["beta_check_summary"]["verdict"] == "pass"
          assert payload["production_readiness_summary"]["verdict"] == "pass"
          assert payload["production_readiness_summary"]["track_scores"]["repo_user_beta_readiness"] == 100
          assert payload["production_readiness_summary"]["track_scores"]["production_grade_creator_system_standard"] == 100
          assert payload["production_readiness_summary"]["track_verdicts"]["network_absorption_publication"] == "blocked"
          PY
          mkdir -p /tmp/creator-system-release-evidence-artifact
          cp /tmp/creator-system-release-evidence.json /tmp/creator-system-release-evidence-artifact/creator-system-release-evidence.json
          mkdir -p /tmp/creator-system-production-readiness-artifact
          cp /tmp/creator-system-production-readiness.json /tmp/creator-system-production-readiness-artifact/creator-system-production-readiness.json
          python -m chip_labs.cli creator-run-template-check --fail-on-blocked

      - name: Upload creator-system release evidence
        uses: actions/upload-artifact@v7
        with:
          name: creator-system-release-evidence
          path: /tmp/creator-system-release-evidence-artifact/creator-system-release-evidence.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload creator-system production readiness
        uses: actions/upload-artifact@v7
        with:
          name: creator-system-production-readiness
          path: /tmp/creator-system-production-readiness-artifact/creator-system-production-readiness.json
          if-no-files-found: error
          retention-days: 30

      - name: Run manual generated multi-seed matrix
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_generated_multi_seed == 'true')
        run: |
          python -m chip_labs.cli generated-multi-seed-run \
            --briefs docs/creator_system/examples/generated-multi-domain-briefs.json \
            --workspace-dir /tmp/generated-creator-matrix \
            --output /tmp/generated-multi-seed-summary.json \
            --fail-on-blocked
          python -m chip_labs.cli generated-multi-seed-summary-check \
            --summary /tmp/generated-creator-matrix/multi_seed_validation_summary.json \
            --output /tmp/generated-multi-seed-summary-check.json \
            --fail-on-blocked
          python - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(Path("/tmp/generated-multi-seed-summary.json").read_text())
          blocked = summary["verdict"] == "blocked"
          blocking_checks = sorted(
              {
                  check
                  for row in summary["rows"]
                  for check in row.get("blocking_checks", [])
              }
          )
          smoke = {
              "schema_version": "adaptive_creator_loop.smoke_result.v1",
              "run_dir": "/tmp/generated-creator-matrix",
              "verdict": "blocked" if blocked else "ready_for_swarm_packet",
              "evidence_tier": summary["evidence_tier"],
              "evidence_mode": summary["evidence_mode"],
              "status_counts": {
                  "pass": summary["passed_run_count"],
                  "warn": 0,
                  "fail": summary["blocked_run_count"],
              },
              "blocking_checks": blocking_checks,
              "warning_checks": [],
              "automation": {
                  "blocked": blocked,
                  "ci_exit_code": 1 if blocked else 0,
                  "recommended_next_command": "Review generated matrix rows, failed seeds, and operator review packets before stronger claims.",
              },
              "checks": [],
              "missing_paths": [],
              "next_actions": summary["next_actions"],
          }
          Path("/tmp/generated-matrix-smoke.json").write_text(
              json.dumps(smoke, indent=2) + "\n"
          )
          PY
          python -m chip_labs.cli creator-mission-status \
            --smoke /tmp/generated-matrix-smoke.json \
            --generated-multi-seed /tmp/generated-multi-seed-summary.json \
            --mission-id generated-multi-seed-manual \
            --output /tmp/generated-mission-status.json
          python -m chip_labs.cli creator-release-gate \
            --validation-plan docs/creator_system/examples/startup-yc-operator-validation/validation_plan.json \
            --generated-summary /tmp/generated-creator-matrix/multi_seed_validation_summary.json \
            --startup-network-review docs/creator_system/examples/startup-yc-operator-validation/network_absorption_review_blocked.json \
            --output /tmp/generated-release-gate.json
          python - <<'PY'
          import json
          from pathlib import Path

          import jsonschema

          for schema_path, payload_path in (
              (
                  "docs/creator_system/schemas/generated-multi-seed-summary.schema.json",
                  "/tmp/generated-multi-seed-summary.json",
              ),
              (
                  "docs/creator_system/schemas/generated-multi-seed-summary-check.schema.json",
                  "/tmp/generated-multi-seed-summary-check.json",
              ),
              (
                  "docs/creator_system/schemas/creator-mission-status.schema.json",
                  "/tmp/generated-mission-status.json",
              ),
              (
                  "docs/creator_system/schemas/creator-release-gate.schema.json",
                  "/tmp/generated-release-gate.json",
              ),
          ):
              schema = json.loads(Path(schema_path).read_text())
              payload = json.loads(Path(payload_path).read_text())
              jsonschema.Draft202012Validator(schema).validate(payload)
          summary = json.loads(Path("/tmp/generated-multi-seed-summary.json").read_text())
          mission = json.loads(Path("/tmp/generated-mission-status.json").read_text())
          release_gate = json.loads(Path("/tmp/generated-release-gate.json").read_text())
          generated_phase = next(
              phase
              for phase in release_gate["phase_status"]
              if phase["phase"] == "generated_multi_seed_validation"
          )
          product_phase = next(
              phase
              for phase in release_gate["phase_status"]
              if phase["phase"] == "product_runtime_integration_review"
          )
          assert release_gate["verdict"] == "blocked"
          assert release_gate["network_absorbable"] is False
          assert generated_phase["passed"] is True
          assert generated_phase["detail"]["row_count"] == summary["matrix"]["target_run_count"]
          assert product_phase["passed"] is False
          assert "missing_product_runtime_review" in product_phase["blocking_checks"]
          mission_matrix = mission["surface_adapters"]["builder"]["generated_multi_seed"]
          print(
              "Generated matrix: "
              f"verdict={summary['verdict']} "
              f"passed={summary['passed_run_count']}/{summary['matrix']['target_run_count']} "
              f"mission_run_count={mission_matrix['run_count']} "
              f"release_gate={release_gate['verdict']} "
              f"network_absorbable={str(summary['network_absorbable']).lower()}"
          )
          PY
          mkdir -p /tmp/generated-creator-matrix-artifact
          cp /tmp/generated-multi-seed-summary.json /tmp/generated-creator-matrix-artifact/generated-multi-seed-summary.json
          cp /tmp/generated-multi-seed-summary-check.json /tmp/generated-creator-matrix-artifact/generated-multi-seed-summary-check.json
          cp /tmp/generated-mission-status.json /tmp/generated-creator-matrix-artifact/generated-mission-status.json
          cp /tmp/generated-release-gate.json /tmp/generated-creator-matrix-artifact/generated-release-gate.json

      - name: Upload generated creator matrix evidence
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_generated_multi_seed == 'true')
        uses: actions/upload-artifact@v7
        with:
          name: generated-creator-matrix-evidence
          path: /tmp/generated-creator-matrix-artifact/*.json
          if-no-files-found: error
          retention-days: 30
